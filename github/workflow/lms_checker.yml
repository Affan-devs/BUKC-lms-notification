name: LMS Assignment Checker

on:
  schedule:
    # Change this line to your preferred schedule
    - cron: '0 9,21 * * *'  # 9 AM, 9 PM,  Pakistan time
  
  # Manual trigger (keep this!)
  workflow_dispatch:

jobs:
  check-lms:
    runs-on: ubuntu-latest
    
    steps:
    - name:  Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name:  Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name:  Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name:  Install Chrome and ChromeDriver
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version
    
    - name:  Check for existing CSV
      run: |
        if [ -f assignments_report.csv ]; then
          echo " Found existing CSV file"
        else
          echo " No CSV file found, will create new one"
        fi
    
    - name:  Run LMS Checker
      env:
        ENROLLMENT: ${{ secrets.ENROLLMENT }}
        PASSWORD: ${{ secrets.PASSWORD }}
        INSTITUTE: ${{ secrets.INSTITUTE }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        COURSE_VALUES: ${{ secrets.COURSE_VALUES }}
      run: |
        echo " Starting LMS check..."
        python lms_automation_github.py
    
    - name:  Commit and Push CSV Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -f assignments_report.csv ]; then
          git add assignments_report.csv
          
          if git diff --staged --quiet; then
            echo "No changes to CSV file"
          else
            git commit -m " Update assignments - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo " CSV updated and pushed to repository"
          fi
        fi
    
    - name:  Upload CSV as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: assignments-csv-${{ github.run_number }}
        path: assignments_report.csv
        retention-days: 30