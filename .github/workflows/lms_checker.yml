name: LMS Assignment Checker

on:
  schedule:
    - cron: '0 4,16 * * *'  # 9 AM, 9 PM Pakistan time
  workflow_dispatch:

jobs:
  check-lms:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run LMS Checker
      env:
        ENROLLMENT: ${{ secrets.ENROLLMENT }}
        PASSWORD: ${{ secrets.PASSWORD }}
        INSTITUTE: ${{ secrets.INSTITUTE }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        COURSE_VALUES: ${{ secrets.COURSE_VALUES }}
      run: python lms_automation_github.py

    - name: Commit and Push CSV Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if [ -f assignments_report.csv ]; then
          git add assignments_report.csv
          if git diff --staged --quiet; then
            echo "No changes to CSV file"
          else
            git commit -m "Update assignments - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
        fi

    - name: Upload CSV as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: assignments-csv-${{ github.run_number }}
        path: assignments_report.csv
        retention-days: 30
