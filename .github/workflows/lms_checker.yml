name: LMS Assignment Checker

on:
  schedule:
    # Runs every 8 hours (8 AM, 2 PM, 8 PM Pakistan time)
    - cron: '0 9,21 * * *'  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  check-lms:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 🌐 Set up Chrome
      uses: browser-actions/setup-chrome@latest
      id: setup-chrome
    
    - name: 📦 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium
    
    - name: ✅ Verify Installation
      run: |
        echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
        "${{ steps.setup-chrome.outputs.chrome-path }}" --version
        echo "ChromeDriver path: ${{ steps.setup-chrome.outputs.chromedriver-path }}"
        "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version
        echo "Python version:"
        python --version
        echo "Selenium installed:"
        pip list | grep selenium
    
    - name: 🔗 Setup ChromeDriver in PATH
      run: |
        sudo ln -sf "${{ steps.setup-chrome.outputs.chromedriver-path }}" /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        echo "ChromeDriver location:"
        which chromedriver
        echo "ChromeDriver version:"
        chromedriver --version
    
    - name: 📚 Check for existing CSV
      run: |
        if [ -f assignments_report.csv ]; then
          echo "✅ Found existing CSV file"
          echo "Current assignments count: $(wc -l < assignments_report.csv)"
        else
          echo "📄 No CSV file found, will create new one"
        fi
    
    - name: 🚀 Run LMS Checker
      env:
        ENROLLMENT: ${{ secrets.ENROLLMENT }}
        PASSWORD: ${{ secrets.PASSWORD }}
        INSTITUTE: ${{ secrets.INSTITUTE }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        COURSE_VALUES: ${{ secrets.COURSE_VALUES }}
      run: |
        echo "🔍 Starting LMS check..."
        python lms_automation_github.py
    
    - name: 💾 Commit and Push CSV Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -f assignments_report.csv ]; then
          git add assignments_report.csv
          
          if git diff --staged --quiet; then
            echo "No changes to CSV file"
          else
            git commit -m "📝 Update assignments - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ CSV updated and pushed to repository"
          fi
        fi
    
    - name: 📊 Upload CSV as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: assignments-csv-${{ github.run_number }}
        path: assignments_report.csv
        retention-days: 30
